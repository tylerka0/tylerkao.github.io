<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Aesthetic & Motion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #111; overflow-x: hidden; }
        .canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f0f0f0 100%); }
        .reveal-text { clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
        .work-item img { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .work-item:hover img { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="canvas-bg"></div>

    <nav class="fixed top-0 w-full p-8 flex justify-between items-center z-50 mix-blend-difference text-white">
        <div class="text-xl font-bold tracking-tighter">STUDIO.</div>
        <div class="space-x-8 uppercase text-xs tracking-widest font-medium">
            <a href="#" class="hover:opacity-50 transition-opacity">Work</a>
            <a href="#" class="hover:opacity-50 transition-opacity">About</a>
            <a href="#" class="hover:opacity-50 transition-opacity">Contact</a>
        </div>
    </nav>

    <section class="h-screen flex flex-col justify-center px-10 md:px-20 lg:px-40">
        <h1 class="reveal-text text-6xl md:text-8xl lg:text-9xl font-bold tracking-tighter leading-none mb-4">
            CREATIVE <br> <span class="text-gray-400">VISIONARY</span>
        </h1>
        <p class="text-lg max-w-md mt-6 text-gray-600 leading-relaxed">
            Crafting digital experiences where surrealism meets professional minimalism.
        </p>
    </section>

    <section class="px-10 md:px-20 lg:px-40 py-20">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-20">
            <div class="work-item group cursor-pointer overflow-hidden">
                <div class="aspect-[4/5] bg-gray-200 overflow-hidden mb-6">
                    <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&w=800&q=80" alt="Work" class="w-full h-full object-cover grayscale group-hover:grayscale-0">
                </div>
                <h3 class="text-2xl font-bold uppercase tracking-tighter">Hypnagogia</h3>
                <p class="text-gray-400 text-sm uppercase tracking-widest mt-1">AI Illustration • 2024</p>
            </div>

            <div class="work-item group cursor-pointer overflow-hidden md:mt-40">
                <div class="aspect-[4/5] bg-gray-200 overflow-hidden mb-6">
                    <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=800&q=80" alt="Work" class="w-full h-full object-cover grayscale group-hover:grayscale-0">
                </div>
                <h3 class="text-2xl font-bold uppercase tracking-tighter">Surreal Flow</h3>
                <p class="text-gray-400 text-sm uppercase tracking-widest mt-1">Digital Art • 2023</p>
            </div>
        </div>
    </section>

    <footer class="p-20 text-center border-t border-gray-200">
        <p class="text-sm text-gray-400">© 2026 Your Name. Build with Vibe.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <script>
        // 1. Initialize Smooth Scroll (Lenis)
        const lenis = new Lenis()
        function raf(time) {
            lenis.raf(time)
            requestAnimationFrame(raf)
        }
        requestAnimationFrame(raf)

        // 2. GSAP Entrance Animations
        gsap.from(".reveal-text", {
            y: 100,
            opacity: 0,
            duration: 1.5,
            ease: "power4.out",
            stagger: 0.2
        });

        // 3. Scroll Reveal for Project Items
        gsap.utils.toArray(".work-item").forEach(item => {
            gsap.from(item, {
                scrollTrigger: {
                    trigger: item,
                    start: "top bottom-=100",
                    toggleActions: "play none none reverse"
                },
                y: 50,
                opacity: 0,
                duration: 1,
                ease: "power3.out"
            });
        });
    </script>
</body>
</html>
